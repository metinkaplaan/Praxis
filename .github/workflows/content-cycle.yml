name: content-cycle

on:
  # RE-ENABLED 2026-07-16: Gemini prepaid credits topped up (1853 TL).
  #
  # Fixed daily plan (agreed 2026-07-16): 5 posts/day, 3 reels + 2 carousels —
  # NOT a rotating N-hour cycle. Each cron line below is a distinct slot; the
  # "Determine forced format" step maps github.event.schedule to the format
  # for that slot. Times are UTC (≈ TR local +3h in parens).
  schedule:
    - cron: "0 8 * * *"   # 08:00 UTC / 11:00 TR — reel
    - cron: "0 11 * * *"  # 11:00 UTC / 14:00 TR — carousel
    - cron: "30 14 * * *" # 14:30 UTC / 17:30 TR — reel
    - cron: "0 18 * * *"  # 18:00 UTC / 21:00 TR — carousel
    - cron: "30 21 * * *" # 21:30 UTC / 00:30 TR — reel
  workflow_dispatch:
    inputs:
      force_format:
        description: "Override format selection (single|carousel|reel) — leave empty for normal rotation"
        required: false

concurrency:
  group: content-cycle
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 25 # Veo generation + polling and multi-slide carousel generation both happen here
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Determine forced format and slot index for this schedule slot
        id: format
        run: |
          case "${{ github.event.schedule }}" in
            "0 8 * * *")   echo "value=reel"     >> "$GITHUB_OUTPUT"; echo "slot_index=0" >> "$GITHUB_OUTPUT" ;;
            "0 11 * * *")  echo "value=carousel" >> "$GITHUB_OUTPUT"; echo "slot_index=1" >> "$GITHUB_OUTPUT" ;;
            "30 14 * * *") echo "value=reel"     >> "$GITHUB_OUTPUT"; echo "slot_index=2" >> "$GITHUB_OUTPUT" ;;
            "0 18 * * *")  echo "value=carousel" >> "$GITHUB_OUTPUT"; echo "slot_index=3" >> "$GITHUB_OUTPUT" ;;
            "30 21 * * *") echo "value=reel"     >> "$GITHUB_OUTPUT"; echo "slot_index=4" >> "$GITHUB_OUTPUT" ;;
            *)             echo "value=${{ inputs.force_format }}" >> "$GITHUB_OUTPUT"; echo "slot_index=" >> "$GITHUB_OUTPUT" ;;
          esac
      - run: npm run content-cycle
        env:
          FORCE_FORMAT: ${{ steps.format.outputs.value }}
          SLOT_INDEX: ${{ steps.format.outputs.slot_index }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
