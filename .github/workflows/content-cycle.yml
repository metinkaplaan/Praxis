name: content-cycle

on:
  # PAUSED 2026-07-15: Gemini prepaid credits depleted — every scheduled run
  # fails with 429 RESOURCE_EXHAUSTED and spams Telegram. Re-enable by
  # uncommenting once credits are topped up (https://ai.studio/projects).
  # schedule:
  #   - cron: "0 */2 * * *" # every 2 hours; GitHub may delay a few minutes, which is fine
  workflow_dispatch:
    inputs:
      force_format:
        description: "Override format selection (single|carousel|reel) — leave empty for normal rotation"
        required: false

concurrency:
  group: content-cycle
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 25 # Veo generation + polling and multi-slide carousel generation both happen here
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run content-cycle
        env:
          FORCE_FORMAT: ${{ inputs.force_format }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
