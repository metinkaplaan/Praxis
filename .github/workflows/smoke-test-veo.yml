name: smoke-test-veo

# One-off manual check for Veo API access. Safe to delete once video.ts is built.
on:
  workflow_dispatch: {}

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx tsx scripts/smoke-test-veo.ts
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
