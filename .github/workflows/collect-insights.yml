name: collect-insights

on:
  schedule:
    - cron: "0 5 * * *" # daily, 1.5h after token-refresh (03:30) so they never overlap
  workflow_dispatch: {}

concurrency:
  group: collect-insights
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run collect-insights
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
          IG_TOKEN_MIDNIGHTCOUPLEGAME: ${{ secrets.IG_TOKEN_MIDNIGHTCOUPLEGAME }}
          IG_USER_ID_MIDNIGHTCOUPLEGAME: ${{ secrets.IG_USER_ID_MIDNIGHTCOUPLEGAME }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
